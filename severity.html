<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Severity 판단 모델 (Spreadsheet Sync)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            font-size: 16px; 
            line-height: 1.6;
            /* 한글 단어가 분리되지 않도록 설정 */
            word-break: keep-all;
        }

        /* 폰트 스타일 수정: weight 700 */
        .font-black {
            font-weight: 700 !important;
            word-break: keep-all !important;
        }

        /* 접근성: 14px 미만의 텍스트가 없도록 강제 조정 */
        .text-\[10px\], .text-\[11px\], .text-xs { font-size: 14px !important; }
        .text-sm { font-size: 15px !important; }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        select { background-image: none !important; }

        /* 로딩 애니메이션: spinning 클래스 존재 시에만 회전 */
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Flowchart Connector Lines */
        .flow-line { border-color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-6 md:p-12">
    <!-- 가로 전체 너비 확장 -->
    <div class="max-w-[95rem] mx-auto space-y-10">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b-2 border-slate-200 pb-8">
            <div class="space-y-2">
                <h1 class="text-4xl font-black flex items-center gap-3 text-slate-900">
                    <i data-lucide="shield-check" class="text-indigo-600 w-10 h-10" aria-hidden="true"></i>
                    Severity 판단 모델
                </h1>
                <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-slate-600 font-bold text-sm ml-1">
                    <div id="sync-status-container" class="flex items-center gap-1.5 px-3 py-1 bg-white border border-slate-200 rounded-full shadow-sm transition-all" role="status">
                        <i id="status-icon" data-lucide="cloud-lightning" class="w-4 h-4 text-indigo-500" aria-hidden="true"></i>
                        <span id="last-sync-time">스프레드시트 데이터 연결 중...</span>
                    </div>
                    <span class="text-slate-300 hidden sm:inline" aria-hidden="true">|</span>
                    <button onclick="fetchSheetData()" class="group flex items-center gap-1.5 hover:text-indigo-600 transition-colors focus:outline-none" aria-label="데이터 실시간 동기화 실행">
                        <i id="sync-icon" data-lucide="refresh-cw" class="w-4 h-4" aria-hidden="true"></i>
                        <span class="border-b border-transparent group-hover:border-indigo-600">실시간 동기화</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Decision Flow Section -->
        <section class="bg-white rounded-[2rem] shadow-md border border-slate-200 overflow-hidden relative" aria-labelledby="simulator-heading">
            <div class="bg-indigo-600 px-8 py-5 flex justify-between items-center text-white">
                <h2 id="simulator-heading">
                    <!-- 클릭 시 처음으로 돌아가는 기능 추가 -->
                    <button onclick="resetFlow()" class="font-bold flex items-center gap-3 text-lg uppercase tracking-wider text-white hover:text-indigo-100 transition-colors focus:outline-none" aria-label="의사결정 시뮬레이터 처음으로 이동">
                        <i data-lucide="git-pull-request" class="w-6 h-6" aria-hidden="true"></i>
                        의사결정 시뮬레이터
                    </button>
                </h2>
                <div class="flex items-center gap-3">
                    <button onclick="handleChoice('summary', '요약 보기')" class="text-base font-black bg-indigo-500 hover:bg-indigo-400 px-5 py-2.5 rounded-xl transition-colors flex items-center gap-2 border border-indigo-400 shadow-sm focus:outline-none">
                        <i data-lucide="layout-dashboard" class="w-5 h-5" aria-hidden="true"></i> 한 눈에 보는 판단 모델
                    </button>
                    <!-- 판단 모델 적용 예시: a 태그로 변경 및 현재 창 이동 설정 -->
                    <a href="severity_ex.html" class="text-base font-black bg-indigo-500 hover:bg-indigo-400 px-5 py-2.5 rounded-xl transition-colors flex items-center gap-2 border border-indigo-400 shadow-sm focus:outline-none no-underline text-white">
                        <i data-lucide="lightbulb" class="w-5 h-5" aria-hidden="true"></i> 판단 모델 적용 예시
                    </a>
                    <button onclick="resetFlow()" class="p-2 hover:bg-white/20 rounded-full transition-colors ml-1 focus:outline-none" aria-label="진단 시뮬레이터 초기화">
                        <i data-lucide="rotate-ccw" class="w-6 h-6" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div id="flow-container" class="p-8 md:p-12 min-h-[600px] flex flex-col items-center justify-center text-center overflow-x-auto" role="region" aria-live="polite">
                <!-- Dynamic Content -->
            </div>

            <nav id="path-breadcrumb" class="hidden bg-slate-50 px-8 py-4 border-t border-slate-100 flex items-center gap-3 text-base font-bold text-slate-500 overflow-x-auto" aria-label="진단 경로">
                <span class="shrink-0 uppercase tracking-widest text-slate-600">Decision Path:</span>
                <div id="path-list" class="flex items-center gap-3"></div>
            </nav>
        </section>

        <!-- Reference Table Section -->
        <section class="bg-white rounded-[2rem] shadow-md border border-slate-200 overflow-hidden" aria-labelledby="reference-heading">
            <div class="px-8 py-8 border-b border-slate-100 space-y-8">
                <div class="flex items-center justify-between">
                    <h3 id="reference-heading" class="font-bold text-slate-900 flex items-center gap-3 text-2xl">
                        <i data-lucide="database" class="text-indigo-500 w-7 h-7" aria-hidden="true"></i>
                        Severity 레퍼런스
                    </h3>
                    <div>
                        <button onclick="showAllData()" class="px-6 py-2.5 bg-slate-800 text-white rounded-xl text-base font-black hover:bg-slate-900 transition-all shadow-md focus:outline-none">
                            전체 목록 보기
                        </button>
                    </div>
                </div>
                
                <div class="flex flex-col md:flex-row md:items-center gap-6 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                    <label for="category-select" class="shrink-0 text-base font-black text-slate-700 uppercase tracking-widest">검사항목 선택</label>
                    <div class="relative flex-grow">
                        <select 
                            id="category-select"
                            class="w-full bg-white border-2 border-slate-200 rounded-xl px-5 py-3 text-base font-bold focus:outline-none focus:border-indigo-500 appearance-none cursor-pointer transition-all"
                            onchange="handleCategoryChange()"
                        >
                        </select>
                        <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                            <i data-lucide="chevron-down" class="w-6 h-6" aria-hidden="true"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-base table-fixed min-w-[1100px]">
                    <thead class="bg-slate-50 border-b-2 border-slate-100 text-slate-600 font-black text-[14px] uppercase tracking-wider">
                        <tr>
                            <th scope="col" class="px-8 py-5 w-[18%]">오류 유형</th>
                            <th scope="col" class="px-8 py-5 w-[15%]">타겟 사용자</th>
                            <th scope="col" class="px-8 py-5 w-[18%]">달성 목표</th>
                            <th scope="col" class="px-8 py-5 w-[37%]">Severity 판단 가이드</th>
                            <th scope="col" class="px-8 py-5 w-[12%] text-center">Severity</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
            
            <div id="empty-state" class="p-32 text-center space-y-6">
                <div id="loader-icon" class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto text-slate-300">
                    <i data-lucide="clipboard-list" class="text-indigo-600 w-10 h-10" aria-hidden="true"></i>
                </div>
                <div class="space-y-2">
                    <p id="loader-text" class="text-slate-600 text-xl font-bold">검사항목을 선택해주세요.</p>
                    <p id="sub-loader-text" class="text-slate-500 text-base font-medium">실시간 동기화된 데이터 구조에 기반하여 목록이 표시됩니다.</p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="text-center text-slate-500 text-[14px] py-12 border-t border-slate-200 tracking-[0.3em] font-bold">
           Severity Matrix v3.2
        </footer>
    </div>

    <script>
        let categories = [];
        let errorTypes = [];
        let currentStep = 'start';
        let pathHistory = [];

        const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0LpxK9gSoLHqlS-vFKOTKFg-POx55fFJZXqakORyDkoboR20aOwOEF12ioKEwnOGfANS5zHgWNB9v/pub?output=csv&gid=1977991480`;

        function parseCSV(str) {
            const result = [];
            let row = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                const nextChar = str[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        current += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        current += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(current);
                        current = '';
                    } else if (char === '\n' || char === '\r') {
                        if (current !== '' || row.length > 0) {
                            row.push(current);
                            result.push(row);
                        }
                        current = '';
                        row = [];
                        if (char === '\r' && nextChar === '\n') i++; 
                    } else {
                        current += char;
                    }
                }
            }
            if (current !== '' || row.length > 0) {
                row.push(current);
                result.push(row);
            }
            return result;
        }

        function processRawData(csvArray) {
            categories = [];
            errorTypes = [];

            for (let i = 1; i < csvArray.length; i++) {
                const cols = csvArray[i];
                if (!cols || cols.length < 2) continue;

                const id = cols[0]?.trim() || "";
                const type = cols[1]?.trim() || "";
                const severity = cols[2]?.trim() || "";
                const target = cols[3]?.trim() || "";
                const goal = cols[4]?.trim() || "";
                const reason = cols[5]?.trim() || "";

                if (id && !id.includes('-') && !severity) {
                    categories.push({ id, name: type });
                } 
                else if (id && id.includes('-') && severity) {
                    const catId = id.split('-')[0];
                    errorTypes.push({ cat: catId, id, type, severity, target, goal, reason });
                }
            }
        }

        async function fetchSheetData() {
            const getSyncIcon = () => document.getElementById('sync-icon');
            const syncTimeText = document.getElementById('last-sync-time');
            const statusIcon = document.getElementById('status-icon');
            const container = document.getElementById('sync-status-container');
            
            const initialIcon = getSyncIcon();
            if (initialIcon) initialIcon.classList.add('spinning');
            
            syncTimeText.innerText = '최신 데이터 확인 중...';
            container.classList.add('bg-indigo-50');

            try {
                const response = await fetch(`${CSV_URL}&cache_bust=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const csvText = await response.text();
                const csvArray = parseCSV(csvText);
                processRawData(csvArray);
                
                updateSyncTime(true);
                initCategorySelect();
            } catch (error) {
                console.error('동기화 실패:', error);
                syncTimeText.innerText = '동기화 실패 (네트워크 확인 필요)';
                syncTimeText.classList.add('text-red-500');
                if (statusIcon) statusIcon.setAttribute('data-lucide', 'alert-triangle');
                updateSyncTime(false);
            } finally {
                const finalIcon = getSyncIcon();
                if (finalIcon) {
                    finalIcon.classList.remove('spinning');
                }
                
                const currentCat = document.getElementById('category-select').value;
                if (currentCat) handleCategoryChange();
                
                container.classList.remove('bg-indigo-50');
                lucide.createIcons();
            }
        }

        function updateSyncTime(isSuccess) {
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')}`;
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            const textEl = document.getElementById('last-sync-time');
            const statusIcon = document.getElementById('status-icon');
            const container = document.getElementById('sync-status-container');

            if (isSuccess) {
                textEl.innerHTML = `최신 버전 반영됨 <span class="text-slate-400 font-medium ml-1">(${dateStr} ${timeStr})</span>`;
                textEl.classList.remove('text-red-500');
                if (statusIcon) {
                    statusIcon.setAttribute('data-lucide', 'check-circle');
                    statusIcon.classList.replace('text-indigo-500', 'text-emerald-500');
                }
                container.classList.replace('border-slate-200', 'border-emerald-100');
            } else {
                textEl.innerText = `업데이트 확인 실패 (${timeStr})`;
            }
            lucide.createIcons();
        }

        function renderFlow() {
            const container = document.getElementById('flow-container');
            const breadcrumb = document.getElementById('path-breadcrumb');
            const pathList = document.getElementById('path-list');

            if (pathHistory.length > 0 && currentStep !== 'summary') {
                breadcrumb.classList.remove('hidden');
                pathList.innerHTML = pathHistory.map((p, i) => `
                    <span class="bg-indigo-50 px-3 py-1 rounded-xl border border-indigo-200 text-indigo-700 text-base font-bold shadow-sm">${p}</span>
                    ${i < pathHistory.length - 1 ? '<i data-lucide="chevron-right" class="w-5 h-5 text-slate-400" aria-hidden="true"></i>' : ''}
                `).join('');
                lucide.createIcons();
            } else { breadcrumb.classList.add('hidden'); }

            if (currentStep === 'start') {
                container.innerHTML = `
                    <div class="space-y-8 max-w-lg fade-in">
                        <div class="bg-indigo-50/50 p-10 rounded-[2.5rem] border-2 border-indigo-100/50 text-left shadow-inner">
                            <h3 class="text-indigo-900 font-black mb-5 flex items-center gap-3 text-lg uppercase tracking-widest">준비 질문</h3>
                            <ul class="text-base text-slate-700 space-y-4 font-bold leading-relaxed">
                                <li class="flex gap-3"><span class="text-indigo-600" aria-hidden="true">01.</span> 타겟 AT 유저를 특정했습니까?</li>
                                <li class="flex gap-3"><span class="text-indigo-600" aria-hidden="true">02.</span> 콘텐츠의 달성 목표가 명확합니까?</li>
                            </ul>
                        </div>
                        <div class="space-y-4">
                            <button onclick="handleChoice('step1', '시작')" class="w-full py-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[1.5rem] font-black transition-all active:scale-95 text-lg shadow-xl shadow-indigo-100 focus:outline-none">
                                진단 프로세스 시작
                            </button>
                        </div>
                    </div>
                `;
            } else if (currentStep === 'summary') {
                container.innerHTML = `
                    <div class="w-full max-w-6xl fade-in space-y-12 py-4 text-center text-slate-800">
                        <!-- Summary Cards 섹션 -->
                        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-stretch">
                            ${renderSummaryCard('CRITICAL', 'bg-red-600', '쓸 수 없음 + 인지 불가', '무엇인지조차 알 수 없어 아무것도 할 수 없는 서비스 Blocker 상황', 'bg-red-50/50', 'border-red-100')}
                            ${renderSummaryCard('MAJOR A', 'bg-orange-500', '인지는 되나 쓸 수 없음', '무엇인지는 알지만 실제 상호작용 요소가 작동하지 않는 상황', 'bg-orange-50/50', 'border-orange-100')}
                            ${renderSummaryCard('MAJOR B', 'bg-orange-600', '불완전 + 회복 어려움', '접근은 가능하나 이용이 불온전하며 상황 파악 및 회복이 어려운 경우', 'bg-orange-50/50', 'border-orange-200', 'border-dashed')}
                            ${renderSummaryCard('MINOR', 'bg-blue-600', '불완전 + 회복 가능', '회복이 가능하거나 유효한 대안 경로가 존재하는 경우', 'bg-blue-50/50', 'border-blue-100')}
                            ${renderSummaryCard('TRIVIAL', 'bg-emerald-500', '실질적 영향 없음', '이용 흐름에 지장이 없는 사소한 품질 이슈', 'bg-emerald-50/50', 'border-emerald-100')}
                        </div>

                        <div class="text-center space-y-2 mb-8 pt-8 border-t border-slate-100">
                            <h3 class="text-2xl font-black text-slate-900">웹 접근성 오류 Severity 판단 플로우챠트</h3>
                        </div>

                        <!-- Flowchart Vertical Container -->
                        <div class="flex flex-col items-center space-y-10 relative">
                            <!-- Step 0 -->
                            <div class="w-full max-w-xl bg-slate-800 text-white p-6 rounded-2xl shadow-xl z-10">
                                <p class="text-[12px] font-black text-slate-300 mb-2 tracking-[0.2em] uppercase">STEP 0 · 판단 전 프레이밍</p>
                                <div class="space-y-1 text-left">
                                    <p class="flex items-center gap-3 font-bold text-base"><span class="w-1.5 h-1.5 bg-indigo-400 rounded-full"></span> 이 오류 유형의 타겟 AT 유저는 누구인가?</p>
                                    <p class="flex items-center gap-3 font-bold text-base"><span class="w-1.5 h-1.5 bg-indigo-400 rounded-full"></span> 오류가 없었을 때 사용자의 달성 목표는 무엇인가?</p>
                                </div>
                            </div>

                            <div class="h-10 w-0.5 bg-slate-300"></div>

                            <!-- Main Question -->
                            <div class="w-full max-w-2xl bg-white border-2 border-slate-200 p-8 rounded-3xl shadow-lg z-10 text-xl font-black text-slate-800">
                                AT 사용자가 해당 콘텐츠·기능을<br/>이용할 수 있는가?
                            </div>

                            <div class="relative w-full">
                                <div class="hidden md:block absolute top-0 left-[20%] right-[20%] h-0.5 bg-slate-300"></div>
                                
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 pt-6 items-start">
                                    
                                    <!-- Path 1: 쓸 수 없다 -->
                                    <div class="flex flex-col items-center space-y-6">
                                        <div class="h-6 w-0.5 bg-slate-300"></div>
                                        <p class="text-red-600 font-black text-base uppercase">쓸 수 없다</p>
                                        <!-- Row 1 alignment -->
                                        <div class="bg-white border-2 border-slate-200 p-6 rounded-2xl w-full shadow-md text-slate-800 flex flex-col justify-center min-h-[150px]">
                                            <p class="font-black text-lg">무엇인지 알 수 있는가?</p>
                                            <p class="text-[12px] text-slate-500 font-bold leading-tight">(AT가 콘텐츠·기능의 목적을<br/>인식 가능한가?)</p>
                                        </div>
                                        
                                        <div class="flex w-full gap-4 items-stretch">
                                            <!-- Row 2 alignment: min-h-[120px] -->
                                            <div class="flex-1 flex flex-col items-center space-y-4 text-white">
                                                <div class="h-6 w-0.5 bg-red-300"></div>
                                                <span class="text-red-600 font-black text-base">알 수 없음</span>
                                                <div class="w-full bg-red-600 p-4 rounded-xl shadow-lg flex-grow flex flex-col justify-center min-h-[120px]">
                                                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1 text-white">CRITICAL</p>
                                                    <p class="font-black text-base">서비스 Blocker</p>
                                                </div>
                                            </div>
                                            <div class="flex-1 flex flex-col items-center space-y-4 text-white">
                                                <div class="h-6 w-0.5 bg-orange-300"></div>
                                                <span class="text-orange-700 font-black text-base">알 수 있음</span>
                                                <div class="w-full bg-orange-500 p-4 rounded-xl shadow-lg flex-grow flex flex-col justify-center min-h-[120px]">
                                                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1 text-white">MAJOR A</p>
                                                    <p class="font-black text-base text-white">상호작용 이용 불가</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Path 2: 접근 가능, 이용 불완전 -->
                                    <div class="flex flex-col items-center space-y-6">
                                        <div class="h-6 w-0.5 bg-slate-300"></div>
                                        <p class="text-indigo-700 font-black text-base uppercase">접근 가능, 이용 불완전</p>
                                        
                                        <!-- Row 1 alignment -->
                                        <div class="bg-white border-2 border-slate-200 p-6 rounded-2xl w-full shadow-md flex flex-col justify-center min-h-[150px]">
                                            <p class="font-black text-slate-800 text-lg">신뢰 가능한 대안이 있는가?</p>
                                            <p class="text-[12px] text-slate-500 font-bold">(일관성 · 설계 의도 · AT 적용 가능성)</p>
                                        </div>

                                        <!-- 수정: items-start를 사용하여 MINOR 박스가 하위 버튼 높이에 맞춰 늘어나는 것 방지 -->
                                        <div class="flex w-full gap-4 items-start">
                                            <!-- Row 2 alignment: min-h-[120px] -->
                                            <div class="flex-1 flex flex-col items-center space-y-4 text-white">
                                                <div class="h-6 w-0.5 bg-blue-300"></div>
                                                <span class="text-blue-700 font-black text-base">대안 있음</span>
                                                <!-- flex-grow 제거하여 높이 고정 -->
                                                <div class="w-full bg-blue-600 p-4 rounded-xl shadow-lg flex flex-col justify-center min-h-[120px]">
                                                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1 text-white">MINOR</p>
                                                    <p class="font-black text-base leading-tight">대안 경로 존재</p>
                                                </div>
                                            </div>
                                            <div class="flex-1 flex flex-col items-center space-y-4">
                                                <div class="h-6 w-0.5 bg-red-300"></div>
                                                <span class="text-red-600 font-black text-base">대안 없음</span>
                                                
                                                <!-- 수정: 높이 동일화 min-h-[120px] -->
                                                <div class="bg-white border-2 border-slate-200 p-4 rounded-xl w-full text-sm font-black text-slate-700 flex flex-col justify-center min-h-[120px]">
                                                    회복 가능하고<br/>상황 파악이 가능한가?
                                                </div>
                                                
                                                <div class="flex w-full gap-2 text-white">
                                                    <div class="flex-1 flex flex-col items-center space-y-2">
                                                        <div class="h-4 w-0.5 bg-blue-300"></div>
                                                        <span class="text-blue-700 font-black text-base">예</span>
                                                        <div class="bg-blue-600 p-2 rounded-lg w-full text-[12px] font-black min-h-[48px] flex items-center justify-center">MINOR</div>
                                                    </div>
                                                    <div class="flex-1 flex flex-col items-center space-y-2">
                                                        <div class="h-4 w-0.5 bg-orange-300"></div>
                                                        <span class="text-orange-700 font-black text-base">아니오</span>
                                                        <div class="bg-orange-400 p-2 rounded-lg w-full text-[12px] font-black min-h-[48px] flex items-center justify-center">MAJOR B</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Path 3: 실질 영향 없음 -->
                                    <div class="flex flex-col items-center space-y-6">
                                        <div class="h-6 w-0.5 bg-slate-300"></div>
                                        <p class="text-slate-700 font-black text-base uppercase">실질 영향 없음</p>
                                        <!-- Row 1 alignment -->
                                        <div class="w-full bg-slate-700 text-white p-6 rounded-2xl shadow-xl space-y-2 flex flex-col justify-center min-h-[150px]">
                                            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1 text-white">TRIVIAL</p>
                                            <p class="font-black text-lg">실질 영향 없음</p>
                                            <p class="text-[12px] text-slate-300 font-bold leading-tight">AT 이용에<br/>미미한 영향</p>
                                        </div>

                                        <!-- 대안 인정 기준 (독립됨) -->
                                        <div class="w-full mt-4">
                                            <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl shadow-sm text-left fade-in text-slate-800">
                                                <p class="text-[11px] font-black text-indigo-600 mb-2 border-b border-indigo-100 pb-1 flex items-center gap-1.5">
                                                    <i data-lucide="help-circle" class="w-3.5 h-3.5" aria-hidden="true"></i> 대안 인정 기준
                                                </p>
                                                <p class="text-[11px] text-indigo-800 leading-relaxed font-bold">
                                                    ① AT 자체 기능으로 달성 목표 완전 실현 가능<br/>
                                                    ② 설계된 다른 UI 경로로 동일 달성 목표 도달 가능
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Content Principles Summary -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-12 border-t border-slate-200 text-left">
                            <div class="space-y-4">
                                <h4 class="text-lg font-black text-slate-900 flex items-center gap-2">
                                    <i data-lucide="check-circle" class="w-5 h-5 text-indigo-600" aria-hidden="true"></i>
                                    대안 유효성 3조건
                                </h4>
                                <ul class="space-y-3 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-sm font-bold text-slate-700">
                                    <li class="flex gap-3"><span class="text-indigo-600 shrink-0" aria-hidden="true">①</span> 일관성 — AT·브라우저 조합과 무관하게 결과가 일관되어야 한다. 복불복은 유효한 대안이 아니다.</li>
                                    <li class="flex gap-3"><span class="text-indigo-600 shrink-0" aria-hidden="true">②</span> 설계 의도 — 해당 목적으로 설계된 속성/메커니즘이어야 한다. AT가 읽더라도 그 목적으로 설계되지 않은 속성은 인정하지 않는다.</li>
                                    <li class="flex gap-3"><span class="text-indigo-600 shrink-0" aria-hidden="true">③</span> AT 적용 가능성 — 해당 AT 유저에게 물리적으로 적용 가능해야 한다.</li>
                                </ul>
                            </div>
                            <div class="space-y-4">
                                <h4 class="text-lg font-black text-slate-900 flex items-center gap-2">
                                    <i data-lucide="eye-off" class="w-5 h-5 text-slate-600" aria-hidden="true"></i>
                                    맥락 제외 원칙
                                </h4>
                                <div class="bg-slate-800 text-slate-200 p-6 rounded-2xl text-sm font-medium italic leading-relaxed shadow-lg">
                                    "무엇인지 알 수 있는가?" 판단 시 기준은 AT가 프로그래밍적으로 전달받는 정보뿐입니다. 시각적 label, 주변 구조는 제외하되 placeholder처럼 AT가 직접 접근하는 속성은 인정합니다.
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-center pt-8">
                            <button onclick="resetFlow()" class="px-12 py-5 bg-indigo-600 text-white rounded-2xl text-xl font-black hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 flex items-center gap-3 active:scale-95 focus:outline-none">
                                <i data-lucide="play-circle" class="w-7 h-7" aria-hidden="true"></i> 시뮬레이터 시작
                            </button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } else if (currentStep === 'step1') {
                container.innerHTML = `
                    <div class="space-y-12 fade-in">
                        <h3 class="text-4xl font-black text-slate-900 leading-tight">AT 사용자가 이 기능을 <br/><span class="text-indigo-600 italic underline decoration-wavy underline-offset-8">정상적으로 쓸 수 있습니까?</span></h3>
                        <div class="flex flex-wrap justify-center gap-6">
                            <button onclick="handleChoice('path1', '쓸 수 없음')" class="px-10 py-10 bg-white hover:bg-red-50 border-2 border-slate-300 hover:border-red-300 rounded-[2.5rem] font-black w-56 transition-all shadow-lg text-lg focus:outline-none">쓸 수 없다</button>
                            <button onclick="handleChoice('path2', '이용 불완전')" class="px-10 py-10 bg-white hover:bg-orange-50 border-2 border-slate-300 hover:border-orange-300 rounded-[2.5rem] font-black w-56 transition-all shadow-lg text-lg focus:outline-none">이용 불완전</button>
                            <button onclick="handleChoice('result-trivial', '영향 미비함')" class="px-10 py-10 bg-white hover:bg-emerald-50 border-2 border-slate-300 hover:border-emerald-300 rounded-[2.5rem] font-black w-56 transition-all shadow-lg text-lg focus:outline-none">영향 미비함</button>
                        </div>
                    </div>
                `;
            } else if (currentStep === 'path1') {
                container.innerHTML = `
                    <div class="space-y-12 fade-in">
                        <h3 class="text-4xl font-black text-slate-900 leading-tight">콘텐츠가 <span class="text-red-600 underline underline-offset-[12px]">무엇인지</span> 알 수 있습니까?</h3>
                        <p class="text-base text-slate-600 font-black uppercase tracking-[0.3em]">맥락 제외 원칙 적용</p>
                        <div class="flex justify-center gap-6">
                            <button onclick="handleChoice('result-critical', '아니오')" class="w-48 py-6 bg-red-600 text-white rounded-2xl font-black shadow-2xl shadow-red-200 active:scale-95 transition-all text-lg focus:outline-none">아니오</button>
                            <button onclick="handleChoice('result-major-a', '예 (인지됨)')" class="w-48 py-6 bg-slate-800 text-white rounded-2xl font-black active:scale-95 transition-all text-lg focus:outline-none">예 (인지됨)</button>
                        </div>
                    </div>
                `;
            } else if (currentStep === 'path2') {
                container.innerHTML = `
                    <div class="space-y-12 fade-in text-slate-800">
                        <h3 class="text-4xl font-black text-slate-900 leading-tight">회복 가능하거나 <br/><span class="text-indigo-600 underline underline-offset-[12px]">유효한 대안</span>이 있습니까?</h3>
                        <div class="flex justify-center gap-6">
                            <button onclick="handleChoice('result-major-b', '아니오')" class="w-48 py-6 bg-orange-600 text-white rounded-2xl font-black shadow-2xl shadow-orange-200 active:scale-95 transition-all text-lg focus:outline-none">아니오</button>
                            <button onclick="handleChoice('result-minor', '예')" class="w-48 py-6 bg-slate-800 text-white rounded-2xl font-black active:scale-95 transition-all text-lg focus:outline-none">예</button>
                        </div>
                        <div class="max-w-xl mx-auto mt-8 bg-indigo-50/50 border border-indigo-100 p-6 rounded-3xl text-left fade-in">
                            <p class="text-indigo-700 font-black mb-3 flex items-center gap-2">
                                <i data-lucide="info" class="w-5 h-5 text-indigo-600" aria-hidden="true"></i> 대안 인정 기준
                            </p>
                            <ul class="space-y-2 text-slate-800 font-bold text-base">
                                <li class="flex gap-2">
                                    <span class="text-indigo-600 shrink-0" aria-hidden="true">①</span>
                                    <span>AT 자체 기능으로 달성 목표 완전 실현 가능</span>
                                </li>
                                <li class="flex gap-2">
                                    <span class="text-indigo-600 shrink-0" aria-hidden="true">②</span>
                                    <span>설계된 다른 UI 경로로 동일 달성 목표 도달 가능</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            } else if (currentStep.startsWith('result-')) {
                const results = {
                    'result-critical': { l: 'CRITICAL', c: 'text-red-600', b: 'bg-red-50', t: '쓸 수 없음 + 인지 불가. 무엇인지조차 알 수 없어 아무것도 할 수 없는 서비스 Blocker 상황입니다.' },
                    'result-major-a': { l: 'MAJOR A', c: 'text-orange-600', b: 'bg-orange-50', t: '인지는 되나 쓸 수 없음. 무엇인지는 알지만 실제 상호작용 요소가 작동하지 않는 상황입니다.' },
                    'result-major-b': { l: 'MAJOR B', c: 'text-orange-600', b: 'bg-orange-50', t: '불완전 + 회복 어려움. 접근은 가능하나 이용이 불온전하며 상황 파악 및 회복이 어려운 경우입니다.' },
                    'result-minor': { l: 'MINOR', c: 'text-indigo-700', b: 'bg-indigo-50', t: '불완전 + 회복 가능. 회복이 가능하거나 유효한 대안 경로가 존재하는 경우입니다.' },
                    'result-trivial': { l: 'TRIVIAL', c: 'text-emerald-700', b: 'bg-emerald-50', t: '실질적 영향 없음. 이용 흐름에 지장이 없는 사소한 품질 이슈입니다.' }
                };
                const res = results[currentStep];
                container.innerHTML = `
                    <div class="space-y-8 fade-in text-slate-800">
                        <div class="text-9xl font-black ${res.c} tracking-tighter" aria-label="결과: ${res.l}">${res.l}</div>
                        <div class="max-w-xl ${res.b} border-2 border-indigo-100 rounded-[2.5rem] p-10 text-xl leading-relaxed mx-auto text-slate-800 font-bold shadow-xl shadow-indigo-50/50">
                            ${res.t}
                        </div>
                        <div class="flex items-center justify-center gap-4 mt-8">
                            <button onclick="resetFlow()" class="flex items-center gap-3 px-10 py-4 bg-white border-2 border-slate-300 rounded-2xl text-base font-black text-slate-700 hover:bg-slate-50 transition-all focus:outline-none">
                                <i data-lucide="rotate-ccw" class="w-6 h-6" aria-hidden="true"></i> 다시 진단하기
                            </button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            }
            lucide.createIcons();
        }

        function renderSummaryCard(level, badgeColor, title, desc, bgColor, borderColor, borderStyle = 'border-solid') {
            return `
                <div class="flex flex-col p-5 rounded-2xl border-2 ${borderColor} ${borderStyle} ${bgColor} text-left space-y-4 shadow-sm h-full">
                    <span class="${badgeColor} text-white text-[12px] font-black px-2.5 py-1 rounded inline-block w-fit tracking-tighter uppercase" aria-hidden="true">${level}</span>
                    <h4 class="font-black text-base text-slate-900 leading-tight">${title}</h4>
                    <p class="text-[14px] text-slate-700 font-bold leading-snug">${desc}</p>
                </div>
            `;
        }

        function handleChoice(next, text) {
            if (next === 'summary') pathHistory = []; 
            else pathHistory.push(text);
            currentStep = next;
            renderFlow();
        }

        function resetFlow() {
            currentStep = 'start';
            pathHistory = [];
            renderFlow();
        }

        function initCategorySelect() {
            const select = document.getElementById('category-select');
            const currentVal = select.value;
            select.innerHTML = `<option value="" disabled ${!currentVal ? 'selected' : ''}>--- 검사항목을 선택하세요 (1 ~ ${categories.length}) ---</option>` + 
                categories.map(c => `<option value="${c.id}" ${currentVal === c.id ? 'selected' : ''}>${c.id}. ${c.name}</option>`).join('');
        }

        function handleCategoryChange() {
            const catId = document.getElementById('category-select').value;
            const filtered = errorTypes.filter(e => e.cat === catId);
            renderTable(filtered);
        }

        function showAllData() {
            document.getElementById('category-select').value = "";
            renderTable(errorTypes);
        }

        function renderTable(data) {
            const body = document.getElementById('table-body');
            const empty = document.getElementById('empty-state');

            if (data.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            
            body.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50/80 transition-colors fade-in">
                    <td class="px-8 py-6 align-top">
                        <div class="font-black text-slate-900 text-lg leading-tight">${item.type}</div>
                        <div class="text-[14px] text-slate-500 mt-2 font-mono font-bold tracking-widest uppercase">ID #${item.id}</div>
                    </td>
                    <td class="px-8 py-6 align-top">
                        <span class="text-base font-black text-slate-800 inline-block">
                            ${item.target}
                        </span>
                    </td>
                    <td class="px-8 py-6 align-top">
                        <div class="text-base text-slate-700 font-black leading-relaxed">
                            ${item.goal}
                        </div>
                    </td>
                    <td class="px-8 py-6 align-top">
                        <p class="text-slate-800 text-base leading-relaxed font-bold">
                            ${item.reason}
                        </p>
                    </td>
                    <td class="px-8 py-6 align-top text-center">
                        <div class="px-4 py-2 rounded-xl text-[14px] font-black border-2 tracking-tighter inline-block min-w-[100px] ${getSeverityClass(item.severity)}">
                            ${item.severity.toUpperCase()}
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function getSeverityClass(level) {
            const l = level.toLowerCase();
            if (l.includes('critical')) return "bg-red-50 text-red-700 border-red-300";
            if (l.includes('major a')) return "bg-orange-50 text-orange-800 border-orange-300";
            if (l.includes('major b')) return "bg-orange-50 text-orange-800 border-orange-300";
            if (l.includes('major')) return "bg-orange-50 text-orange-800 border-orange-300";
            if (l.includes('minor')) return "bg-indigo-50 text-indigo-800 border-indigo-300";
            return "bg-slate-50 text-slate-700 border-slate-300";
        }

        window.onload = () => {
            fetchSheetData(); 
            renderFlow();
            lucide.createIcons();
        };
    </script>
</body>
</html>
