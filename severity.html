<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Severity 판단 모델 (Large Text)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        
        /* 기본 폰트 설정 및 최소 사이즈 보장 */
        body { 
            font-family: 'Pretendard', sans-serif; 
            font-size: 16px; /* 기본 폰트를 16px로 상향 */
            line-height: 1.6;
        }

        /* 14px 미만의 텍스트가 없도록 강제 조정 */
        .text-\[10px\], .text-\[11px\], .text-xs { font-size: 14px !important; }
        .text-sm { font-size: 15px !important; }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        select { background-image: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-6 md:p-12">
    <!-- 전체 너비를 81rem으로 조정 -->
    <div class="max-w-[81rem] mx-auto space-y-10">    
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b-2 border-slate-200 pb-8">
            <div>
                <h1 class="text-4xl font-black flex items-center gap-3 text-slate-900">
                    <i data-lucide="shield-check" class="text-indigo-600 w-10 h-10"></i>
                    Severity 판단 모델
                </h1>
                <!-- <p class="text-slate-500 mt-2 text-lg font-medium">CSV 구조 및 데이터 기반 동적 매칭 뷰어</p> -->
            </div>
        </header>

        <!-- Decision Flow Section -->
        <section class="bg-white rounded-[2rem] shadow-md border border-slate-200 overflow-hidden relative">
            <div class="bg-indigo-600 px-8 py-5 flex justify-between items-center text-white">
                <h2 class="font-bold flex items-center gap-3 text-lg uppercase tracking-wider">
                    <i data-lucide="git-pull-request" class="w-6 h-6"></i>
                    의사결정 시뮬레이터
                </h2>
                <div class="flex items-center gap-4">
                    <button onclick="handleChoice('summary', '요약 보기')" class="text-base font-black bg-indigo-500 hover:bg-indigo-400 px-5 py-2.5 rounded-xl transition-colors flex items-center gap-2 border border-indigo-400 shadow-sm">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> 한 눈에 보는 판단 모델
                    </button>
                    <button onclick="resetFlow()" class="p-2 hover:bg-white/20 rounded-full transition-colors">
                        <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>

            <div id="flow-container" class="p-12 min-h-[500px] flex flex-col items-center justify-center text-center">
                <!-- Dynamic Content -->
            </div>

            <div id="path-breadcrumb" class="hidden bg-slate-50 px-8 py-4 border-t border-slate-100 flex items-center gap-3 text-base font-bold text-slate-400 overflow-x-auto">
                <span class="shrink-0 uppercase tracking-widest text-slate-500">Decision Path:</span>
                <div id="path-list" class="flex items-center gap-3"></div>
            </div>
        </section>

        <!-- Reference Table Section -->
        <section class="bg-white rounded-[2rem] shadow-md border border-slate-200 overflow-hidden">
            <div class="px-8 py-8 border-b border-slate-100 space-y-8">
                <div class="flex items-center justify-between">
                    <h3 class="font-bold text-slate-900 flex items-center gap-3 text-2xl">
                        <i data-lucide="database" class="text-indigo-500 w-7 h-7"></i>
                        Severity 레퍼런스
                    </h3>
                    <div id="result-badge" class="hidden">
                        <span id="result-count" class="text-sm font-black bg-indigo-600 text-white px-4 py-1.5 rounded-full shadow-md shadow-indigo-100">0건</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="md:col-span-3">
                        <label for="category-select" class="block text-[14px] font-black text-slate-400 mb-3 uppercase tracking-widest">검사항목 선택</label>
                        <div class="relative">
                            <select 
                                id="category-select"
                                class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl px-5 py-4 text-base font-bold focus:outline-none focus:ring-4 focus:ring-indigo-500/10 appearance-none cursor-pointer transition-all"
                                onchange="handleCategoryChange()"
                            >
                            </select>
                            <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                <i data-lucide="chevron-down" class="w-6 h-6"></i>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col justify-end">
                        <button onclick="showAllData()" class="w-full py-4 bg-slate-800 text-white rounded-2xl text-base font-black hover:bg-slate-900 transition-all shadow-lg shadow-slate-200">
                            전체 목록 보기
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-base table-fixed min-w-[1200px]">
                    <thead class="bg-slate-50 border-b-2 border-slate-100 text-slate-500 font-black text-[14px] uppercase tracking-wider">
                        <tr>
                            <th class="px-8 py-5 w-[18%]">오류 유형</th>
                            <th class="px-8 py-5 w-[15%]">타겟 AT 유저</th>
                            <th class="px-8 py-5 w-[18%] text-center">달성 목표</th>
                            <th class="px-8 py-5 w-[37%]">Severity 근거</th>
                            <th class="px-8 py-5 w-[12%] text-center">Severity</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
            
            <div id="empty-state" class="p-32 text-center space-y-6">
                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto text-slate-200">
                    <i data-lucide="clipboard-list" class="w-10 h-10"></i>
                </div>
                <div class="space-y-2">
                    <p class="text-slate-500 text-xl font-bold">검사항목을 선택해주세요.</p>
                    <p class="text-slate-400 text-base font-medium">CSV 데이터 구조에 기반하여 매칭된 오류 유형 목록이 표시됩니다.</p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="text-center text-slate-400 text-[14px] py-12 border-t border-slate-200 uppercase tracking-[0.3em] font-bold">
            Accessibility Team • Severity Matrix Verification Tool v3.1
        </footer>
    </div>

    <script>
        const rawCsvData = `항목번호,오류유형,Severity,대상,달성 목표,판단 가이드
1,적절한 대체 텍스트 제공,,,,
1-1,이미지 alt 누락/의미 왜곡,Critical,스크린리더 사용자,이미지 내용 파악,alt 없이 이미지 접근 시 무엇인지 알 수 없어 정보 파악 자체 불가 → Critical
1-2,불필요한 alt 제공,Minor,스크린리더 사용자,불필요한 정보 없이 페이지 탐색,장식 이미지 alt 미처리로 노이즈 발생하나 핵심 이용 방해 없음 → Minor
1-3,복잡 이미지 설명 부족,Major,스크린리더 사용자,차트·조직도 데이터 파악,이미지 존재는 알 수 있으나 핵심 데이터 관계 파악 불가로 이용 불완전 → Major
1-4,title 만으로 대체 제공,Critical,스크린리더 사용자,이미지 내용 파악,title은 AT별 지원 복불복 + alt 대체 목적 미설계 → 대안 불인정 → Critical
1-5,QR코드 정보 미제공,Critical,스크린리더 사용자,QR코드가 안내하는 정보·서비스 접근,alt·URL 없으면 QR코드 목적 자체 알 수 없어 접근 불가 → Critical
1-6,배경이미지에 정보 포함,Critical,스크린리더 사용자,CSS 배경 이미지 내 핵심 정보 파악,CSS 배경은 AT 인식 불가 → 정보 존재 자체 알 수 없음 → Critical
1-7,사용자 대체텍스트 입력기능 없음,Major,스크린리더 사용자,업로드한 이미지에 대체 텍스트 제공,이미지 업로드 자체 접근 가능하나 대체 텍스트 입력 수단 없어 이용 불완전 → Major
1-8,longdesc 연결 오류,Minor,스크린리더 사용자,복잡 이미지 상세 설명 접근,longdesc 오류이나 이미지 자체 접근 가능하고 대안 경로 존재 → Minor
1-9,HTML5 longdesc 사용,Minor,스크린리더 사용자,상세 이미지 설명 접근,폐기 속성 사용이나 이미지 alt 별도 제공 가능 → Minor
1-10,area/longdesc alt 누락,Critical,스크린리더 사용자,이미지 맵 영역별 링크 목적 파악,area alt 없으면 링크 목적 알 수 없어 목적지 파악 및 실행 불가 → Critical
1-11,소리 정보 대체 미제공,Critical,청각장애 사용자,알림음 등 소리 정보 파악,시각적 피드백 없으면 소리 기반 알림 내용 알 수 없어 정보 파악 불가 → Critical
2,자막 제공,,,,
2-1,자막·대본 전무,Critical,청각장애 사용자 / 스크린리더 사용자,영상 음성 정보 파악,대체 수단 전무로 영상 음성 정보에 전혀 접근 불가 → Critical
2-2,자막·대본 불충분,Major,청각장애 사용자,영상 내 핵심 대사 파악,자막 존재하나 핵심 대사 누락으로 영상 이해 불완전 → Major
2-3,사용자 영상 대체수단 입력 기능 없음,Major,청각장애 사용자,업로드 영상에 자막 제공,영상 업로드 가능하나 자막 첨부 수단 없어 접근성 준수 불완전 → Major
3,표의 구성,,,,
3-1,표 제목/요약 미제공,Major,스크린리더 사용자,표의 주제·목적 파악,caption 없어 표 목적 파악 어려우나 데이터 자체 접근 가능 → Major
3-2,제목·요약 불충분,Major,스크린리더 사용자,표 목적 파악 및 데이터 탐색,caption이 무의미해 표 목적 파악 불완전하나 데이터 구조 탐색 가능 → Major
3-3,th/td 구분 오류,Major,스크린리더 사용자,표 행/열 관계 파악 및 데이터 이해,제목·내용 셀 구분 불명확으로 데이터 관계 파악 어려워 이용 불완전 → Major
3-4,headers/id 누락,Major,스크린리더 사용자,복잡 표 데이터 관계 파악,headers/id 미연결로 복잡 표 관계 파악 불완전 → Major
3-5,중첩 표 제공,Minor,스크린리더 사용자,표 내 데이터 탐색,중첩 구조로 탐색 복잡하나 데이터 자체 접근 가능 → Minor
3-6,배치용 테이블에 th 사용,Minor,스크린리더 사용자,레이아웃 구조 이해,레이아웃용 표에 불필요 th 사용으로 노이즈 발생하나 콘텐츠 이용 가능 → Minor
4,콘텐츠의 선형구조,,,,
4-1,순서 비논리,Major,스크린리더 사용자 / 키보드 사용자,논리적 순서로 콘텐츠 탐색,DOM 순서 불일치로 콘텐츠 맥락 파악 불완전하나 전체 접근 가능 → Major
4-2,구조 비논리,Major,스크린리더 사용자,계층 구조 파악 및 탐색,계층 구조 비논리로 관계 파악 불완전 → Major
5,명확한 지시사항 제공,,,,
5-1,시각 정보 의존 지시,Major,스크린리더 사용자 / 저시력 사용자,지시사항에 따른 동작 수행,색·위치 의존 지시로 해당 요소 파악 어려워 지시 수행 불완전 → Major
5-2,청각 정보 의존 지시,Major,청각장애 사용자,청각 지시사항에 따른 동작 수행,소리에만 의존한 지시로 청각 장애 사용자 지시 파악 불가 → Major
6,색에 무관한 콘텐츠 인식,,,,
6-1,색으로만 내용 구분,Major,저시력 사용자 / 색각장애 사용자,그래프·차트 항목별 정보 파악,색상 외 구분 수단 없어 항목 구별 불가로 데이터 파악 불완전 → Major
6-2,색으로만 상태 구분,Major,저시력 사용자 / 색각장애 사용자,오류·필수 항목 상태 파악,색상만으로 상태 구분 시 색각 장애 사용자 상태 파악 불가 → Major
7,자동 재생 금지,,,,
7-1,자동 재생(3초 이상),Critical,스크린리더 사용자,자동 재생 미디어 제어 및 콘텐츠 탐색,자동 배경음이 SR 읽기 방해 + 정지 수단 없어 콘텐츠 탐색 자체 불가 → Critical
7-2,포커스시 자동 재생,Critical,스크린리더 사용자 / 키보드 사용자,키보드 탐색 중 미디어 제어,포커스 시 자동 재생으로 SR 출력 방해 + 정지 수단 없어 탐색 방해 → Critical
8,텍스트 콘텐츠의 명도 대비,,,,
8-1,일반 텍스트 대비 4.5:1 미만,Major,저시력 사용자,텍스트 내용 판독,명도 대비 부족으로 텍스트 판독 어려워 이용 불완전 → Major
8-2,큰 텍스트 대비 3:1 미만,Major,저시력 사용자,큰 텍스트 내용 판독,큰 텍스트 명도 부족으로 판독 어려워 이용 불완전 → Major
8-3,이미지 텍스트 대비 미흡,Major,저시력 사용자,이미지 내 텍스트 판독,이미지 텍스트 명도 부족으로 판독 어려워 이용 불완전 → Major
9,콘텐츠 간의 구분,,,,
9-1,콘텐츠 구분 미흡,Minor,저시력 사용자,UI 요소 간 시각적 구분 파악,구분 미흡으로 불편하나 인접 UI 실질 기능 이용 가능 → Minor
10,키보드 사용 보장,,,,
10-1,키보드 접근 불가,Critical,키보드 사용자 / 스위치 사용자,키보드만으로 기능 실행,마우스 전용 기능은 키보드 사용자 접근 자체 불가 → Critical
11,초점 이동과 표시,,,,
11-1,초점 이동 순서 비논리,Major,키보드 사용자,논리적 순서로 키보드 탐색,초점 순서 혼란으로 탐색 맥락 파악 어려워 이용 불완전 → Major
11-2,초점 표시 미제공,Major,키보드 사용자,현재 초점 위치 확인 및 탐색,초점 시각화 제거로 현재 위치 파악 불가하나 기능 자체 접근 가능 → Major
11-3,운용 불가능 요소에 초점,Minor,키보드 사용자,실행 가능 요소로 정확히 이동,불필요 요소에 초점이 가나 실제 기능 요소 접근 가능 → Minor
11-4,좌·우 쓸기-이전/다음 항목 선택 시 초점 비논리,Major,모바일 스크린리더 사용자,모바일 스와이프로 항목 순서 탐색,스와이프 초점 순서 비논리로 탐색 맥락 파악 어려워 이용 불완전 → Major
11-5,화면에 보이지 않는 개체에 초점 이동,Minor,키보드 사용자,화면 내 실제 요소로 초점 이동,숨겨진 요소에 초점이 이동하나 실제 콘텐츠 탐색 가능 → Minor
11-6,초점 이동 불가 상태 발생,Critical,키보드 사용자 / 스위치 사용자,모달 닫기 및 이전 화면 복귀,키보드 트랩으로 탈출 불가 → 서비스 전체 이용 막힘 → Critical
12,조작 가능,,,,

        const categories = [];
        const errorTypes = [];

        function parseCSVData() {
            const lines = rawCsvData.trim().split('\n');
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const cols = line.split(',');
                const id = cols[0];
                const type = cols[1];
                const severity = cols[2];
                const target = cols[3];
                const goal = cols[4];
                const reason = cols[5];

                if (!id.includes('-') && !severity) {
                    categories.push({ id, name: type });
                } else if (id.includes('-') && severity) {
                    const catId = id.split('-')[0];
                    errorTypes.push({ cat: catId, id, type, severity, target, goal, reason });
                }
            }
        }

        let currentStep = 'start';
        let pathHistory = [];

        function renderFlow() {
            const container = document.getElementById('flow-container');
            const breadcrumb = document.getElementById('path-breadcrumb');
            const pathList = document.getElementById('path-list');

            if (pathHistory.length > 0 && currentStep !== 'summary') {
                breadcrumb.classList.remove('hidden');
                pathList.innerHTML = pathHistory.map((p, i) => `
                    <span class="bg-indigo-50 px-3 py-1 rounded-xl border border-indigo-100 text-indigo-600 text-base font-bold shadow-sm">${p}</span>
                    ${i < pathHistory.length - 1 ? '<i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>' : ''}
                `).join('');
                lucide.createIcons();
            } else { breadcrumb.classList.add('hidden'); }

            if (currentStep === 'start') {
                container.innerHTML = `
                    <div class="space-y-8 max-w-lg fade-in">
                        <div class="bg-indigo-50/50 p-10 rounded-[2.5rem] border-2 border-indigo-100/50 text-left shadow-inner">

                            </ul>

                                진단 프로세스 시작
                            </button>
                            <button onclick="handleChoice('summary', '요약')" class="w-full py-6 bg-white border-2 border-indigo-200 text-indigo-600 hover:bg-indigo-50 rounded-[1.5rem] font-black transition-all text-lg flex items-center justify-center gap-3">

                `;
            } else if (currentStep === 'summary') {

                            <div class="bg-red-50 border border-red-100 p-4 rounded-2xl text-left space-y-2 shadow-sm">
                                <span class="bg-red-600 text-white text-sm font-black px-2 py-0.5 rounded tracking-tighter">CRITICAL</span>
                                <h4 class="font-bold text-sm text-red-900 leading-tight pt-1">쓸 수 없음 + 인지 불가</h4>
                                <p class="text-sm text-red-700 leading-relaxed">무엇인지조차 알 수 없어 아무것도 할 수 없는 서비스 Blocker 상황</p>
                            </div>
                            <div class="bg-orange-50 border border-orange-100 p-4 rounded-2xl text-left space-y-2 shadow-sm">
                                <span class="bg-orange-500 text-white text-sm font-black px-2 py-0.5 rounded tracking-tighter">MAJOR A</span>
                                <h4 class="font-bold text-sm text-orange-900 leading-tight pt-1">인지는 되나 쓸 수 없음</h4>
                                <p class="text-sm text-orange-700 leading-relaxed">무엇인지는 알지만 실제 상호작용 요소가 작동하지 않는 상황</p>
                            </div>
                            <div class="bg-orange-50 border border-orange-100 p-4 rounded-2xl text-left space-y-2 shadow-sm border-dashed border-orange-300">
                                <span class="bg-orange-400 text-white text-sm font-black px-2 py-0.5 rounded tracking-tighter">MAJOR B</span>
                                <h4 class="font-bold text-sm text-orange-900 leading-tight pt-1">불완전 + 회복 어려움</h4>
                                <p class="text-sm text-orange-700 leading-relaxed">접근은 가능하나 이용이 불온전하며 상황 파악 및 회복이 어려운 경우</p>
                            </div>
                            <div class="bg-yellow-50 border border-yellow-100 p-4 rounded-2xl text-left space-y-2 shadow-sm">
                                <span class="bg-yellow-500 text-white text-sm font-black px-2 py-0.5 rounded tracking-tighter">MINOR</span>
                                <h4 class="font-bold text-sm text-yellow-900 leading-tight pt-1">불완전 + 회복 가능</h4>
                                <p class="text-sm text-yellow-700 leading-relaxed">회복이 가능하거나 유효한 대안 경로가 존재하는 경우</p>
                            </div>
                            <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl text-left space-y-2 shadow-sm">
                                <span class="bg-emerald-500 text-white text-sm font-black px-2 py-0.5 rounded tracking-tighter">TRIVIAL</span>
                                <h4 class="font-bold text-sm text-emerald-900 leading-tight pt-1">실질적 영향 없음</h4>
                                <p class="text-sm text-emerald-700 leading-relaxed">이용 흐름에 지장이 없는 사소한 품질 이슈</p>
                            </div>
                        </div>
                        <div class="bg-slate-50 border border-slate-200 p-6 rounded-3xl text-left">
                            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 shrink-0"><i data-lucide="check-check" class="w-5 h-5"></i></div>
                                    <div>
                                        <h5 class="text-sm font-bold text-slate-800">대안 유효성 3조건</h5>
                                        <p class="text-sm text-slate-500 font-medium">일관성 · 설계 의도 · AT 적용 가능성</p>
                                    </div>
                                </div>
                                <div class="h-px w-full md:w-px md:h-8 bg-slate-200"></div>
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 shrink-0"><i data-lucide="eye-off" class="w-5 h-5"></i></div>
                                    <div>
                                        <h5 class="text-sm font-bold text-slate-800">맥락 제외 원칙</h5>
                                        <p class="text-sm text-slate-500 font-medium">시각적 도움 없이 AT 전달 정보만 기준</p>
                                    </div>
                                </div>
                                <div class="h-px w-full md:w-px md:h-8 bg-slate-200"></div>
                                <button onclick="resetFlow()" class="px-6 py-3 bg-slate-800 text-white rounded-xl text-sm font-bold hover:bg-slate-900 transition-all shadow-lg shadow-slate-200">
                                    진단 시작하기
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentStep === 'step1') {
                container.innerHTML = `
                    <div class="space-y-12 fade-in">
                        <h3 class="text-4xl font-black text-slate-900 leading-tight">AT 사용자가 이 기능을 <br/><span class="text-indigo-600 italic underline decoration-wavy underline-offset-8">쓸 수 있습니까?</span></h3>
                        <div class="flex flex-wrap justify-center gap-6">
                            <button onclick="handleChoice('path1', '쓸 수 없음')" class="px-10 py-10 bg-white hover:bg-red-50 border-2 border-slate-200 hover:border-red-200 rounded-[2.5rem] font-black w-56 transition-all shadow-lg text-lg">쓸 수 없다</button>
                            <button onclick="handleChoice('path2', '이용 불완전')" class="px-10 py-10 bg-white hover:bg-orange-50 border-2 border-slate-200 hover:border-orange-200 rounded-[2.5rem] font-black w-56 transition-all shadow-lg text-lg">이용 불완전</button>
                            <button onclick="handleChoice('result-trivial', '영향 없음')" class="px-10 py-10 bg-white hover:bg-emerald-50 border-2 border-slate-200 hover:border-emerald-200 rounded-[2.5rem] font-black w-56 transition-all shadow-lg text-lg">영향 없음</button>
                        </div>
                    </div>
                `;
            } else if (currentStep === 'path1') {
                container.innerHTML = `
                    <div class="space-y-12 fade-in">
                        <h3 class="text-4xl font-black text-slate-900 leading-tight">콘텐츠가 <span class="text-red-600 underline underline-offset-[12px]">무엇인지</span> 알 수 있습니까?</h3>
                        <p class="text-base text-slate-400 font-black uppercase tracking-[0.3em]">맥락 제외 원칙 적용</p>
                        <div class="flex justify-center gap-6">
                            <button onclick="handleChoice('result-critical', '아니오')" class="w-48 py-6 bg-red-600 text-white rounded-2xl font-black shadow-2xl shadow-red-200 active:scale-95 transition-all text-lg">아니오</button>
                            <button onclick="handleChoice('result-major-a', '예 (인지됨)')" class="w-48 py-6 bg-slate-800 text-white rounded-2xl font-black active:scale-95 transition-all text-lg">예 (인지됨)</button>
                        </div>
                    </div>
                `;
            } else if (currentStep === 'path2') {
                container.innerHTML = `
                    <div class="space-y-12 fade-in">
                        <h3 class="text-4xl font-black text-slate-900 leading-tight">회복 가능하거나 <br/><span class="text-indigo-600 underline underline-offset-[12px]">유효한 대안</span>이 있습니까?</h3>
                        <div class="flex justify-center gap-6">
                            <button onclick="handleChoice('result-major-b', '아니오')" class="w-48 py-6 bg-orange-600 text-white rounded-2xl font-black shadow-2xl shadow-orange-200 active:scale-95 transition-all text-lg">아니오</button>
                            <button onclick="handleChoice('result-minor', '예')" class="w-48 py-6 bg-slate-800 text-white rounded-2xl font-black active:scale-95 transition-all text-lg">예</button>
                        </div>
                    </div>
                `;
            } else if (currentStep.startsWith('result-')) {
                const results = {
                    'result-critical': { l: 'CRITICAL', c: 'text-red-600', b: 'bg-red-50', t: '정보 파악 불가 및 서비스 Blocker. 원천적 차단 상태입니다.' },
                    'result-major-a': { l: 'MAJOR', c: 'text-orange-500', b: 'bg-orange-50', t: '무엇인지는 알 수 있으나 상호작용이 불가능합니다 (조건 A).' },
                    'result-major-b': { l: 'MAJOR', c: 'text-orange-500', b: 'bg-orange-50', t: '이용이 불완전하며 상황 파악 및 회복이 매우 어렵습니다 (조건 B).' },
                    'result-minor': { l: 'MINOR', c: 'text-yellow-600', b: 'bg-yellow-50', t: '이용이 다소 불편하나 상황 파악이 가능하거나 유효한 대안 경로가 존재합니다.' },
                    'result-trivial': { l: 'TRIVIAL', c: 'text-emerald-500', b: 'bg-emerald-50', t: '실제 이용에 지장이 없는 사소한 품질 이슈입니다.' }
                };
                const res = results[currentStep];
                container.innerHTML = `
                    <div class="space-y-8 fade-in">
                        <div class="text-base font-black text-slate-400 uppercase tracking-[0.5em]">Final Severity</div>
                        <div class="text-9xl font-black ${res.c} tracking-tighter">${res.l}</div>
                        <div class="max-w-xl ${res.b} border-2 border-indigo-100 rounded-[2.5rem] p-10 text-xl leading-relaxed mx-auto text-slate-700 font-bold shadow-xl shadow-indigo-50/50">
                            ${res.t}
                        </div>
                        <div class="flex items-center justify-center gap-4 mt-8">
                            <button onclick="resetFlow()" class="flex items-center gap-3 px-10 py-4 bg-white border-2 border-slate-200 rounded-2xl text-base font-black text-slate-500 hover:bg-slate-50 transition-all">
                                <i data-lucide="rotate-ccw" class="w-6 h-6"></i> 다시 진단하기
                            </button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            }
            lucide.createIcons();
        }

        function renderSummaryCard(level, color, subtitle, desc) {
            return `
                <div class="bg-white border-2 border-slate-100 p-6 rounded-[1.5rem] text-left space-y-4 shadow-sm hover:shadow-md transition-shadow">
                    <span class="${color} text-white text-[14px] font-black px-3 py-1 rounded tracking-tighter">${level}</span>
                    <h4 class="font-black text-base text-slate-900 leading-tight pt-1">${subtitle}</h4>
                    <p class="text-[14px] text-slate-500 font-bold leading-relaxed">${desc}</p>
                </div>
            `;
        }

        function handleChoice(next, text) {
            if (next === 'summary') pathHistory = []; 
            else pathHistory.push(text);
            currentStep = next;
            renderFlow();
        }

        function resetFlow() {
            currentStep = 'start';
            pathHistory = [];
            renderFlow();
        }

        function initCategorySelect() {
            const select = document.getElementById('category-select');
            select.innerHTML = `<option value="" disabled selected>--- 검사항목을 선택하세요 (1 ~ ${categories.length}) ---</option>` + 
                categories.map(c => `<option value="${c.id}">${c.id}. ${c.name}</option>`).join('');
        }

        function handleCategoryChange() {
            const catId = document.getElementById('category-select').value;
            const filtered = errorTypes.filter(e => e.cat === catId);
            renderTable(filtered);
        }

        function showAllData() {
            document.getElementById('category-select').value = "";
            renderTable(errorTypes);
        }

        function renderTable(data) {
            const body = document.getElementById('table-body');
            const empty = document.getElementById('empty-state');
            const countBadge = document.getElementById('result-badge');
            const countText = document.getElementById('result-count');

            if (data.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
                countBadge.classList.add('hidden');
                return;
            }

            empty.classList.add('hidden');
            countBadge.classList.remove('hidden');
            countText.innerText = `${data.length}건 매칭됨`;
            
            body.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50/80 transition-colors fade-in">
                    <td class="px-8 py-6 align-top">
                        <div class="font-black text-slate-900 text-lg leading-tight">${item.type}</div>
                        <div class="text-[14px] text-slate-400 mt-2 font-mono font-bold tracking-widest uppercase">ID #${item.id}</div>
                    </td>
                    <td class="px-8 py-6 align-top">
                        <span class="text-[14px] font-black text-indigo-700 bg-indigo-50 border-2 border-indigo-100 px-3 py-1.5 rounded-xl shadow-sm inline-block">
                            ${item.target}
                        </span>
                    </td>
                    <td class="px-8 py-6 align-top text-center">
                        <div class="text-[14px] text-slate-600 font-black bg-white border-2 border-slate-100 p-4 rounded-xl italic leading-relaxed shadow-sm">
                            ${item.goal}
                        </div>
                    </td>
                    <td class="px-8 py-6 align-top">
                        <p class="text-slate-700 text-base leading-relaxed font-bold">
                            ${item.reason}
                        </p>
                    </td>
                    <td class="px-8 py-6 align-top text-center">
                        <div class="px-4 py-2 rounded-xl text-[14px] font-black border-2 tracking-tighter shadow-md inline-block min-w-[100px] ${getSeverityClass(item.severity)}">
                            ${item.severity.toUpperCase()}
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function getSeverityClass(level) {
            const l = level.toLowerCase();
            if (l.includes('critical')) return "bg-red-50 text-red-700 border-red-200";
            if (l.includes('major')) return "bg-orange-50 text-orange-700 border-orange-200";
            if (l.includes('minor')) return "bg-yellow-50 text-yellow-700 border-yellow-200";
            return "bg-slate-50 text-slate-500 border-slate-200";
        }

        window.onload = () => {
            parseCSVData();
            initCategorySelect();
            renderFlow();
            lucide.createIcons();
        };
    </script>
</body>
</html>
